name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    # Указываем, что ВСЕ команды ниже должны выполняться в папке с Flutter
    defaults:
      run:
        working-directory: tgflutter-improved

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK (release)
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-release-apk
          # Путь к файлу считается от КОРНЯ репозитория, поэтому добавляем имя папки
          path: tgflutter-improved/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
