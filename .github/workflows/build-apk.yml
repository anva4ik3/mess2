name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    # Все команды выполняются внутри папки с Flutter-кодом
    defaults:
      run:
        working-directory: tgflutter-improved

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK (release)
        # Флаги --no-tree-shake-icons и --no-pub помогают избежать ошибок с ресурсами и конфликтов версий
        run: flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-release-apk
          # Путь указывается от корня репозитория
          path: tgflutter-improved/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
