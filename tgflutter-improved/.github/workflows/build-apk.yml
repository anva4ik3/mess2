name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (e.g. https://your-backend.railway.app)'
        required: false
        default: 'https://your-backend.railway.app'

env:
  FLUTTER_VERSION: '3.19.0'
  API_URL: ${{ github.event.inputs.api_url || 'https://your-backend.railway.app' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Check Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=API_URL=${{ env.API_URL }}

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ env.API_URL }} \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload debug info
        uses: actions/upload-artifact@v4
        with:
          name: debug-info
          path: build/debug-info/
          retention-days: 30
        continue-on-error: true

      - name: Show APK sizes
        run: |
          echo "=== APK Sizes ==="
          ls -lh build/app/outputs/flutter-apk/
