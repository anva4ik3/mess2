plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // Namespace должен соответствовать твоему пакету
    namespace "com.example.messenger"
    
    // Фиксируем версию SDK до 34, чтобы GitHub Actions не искал более старые/новые
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.messenger"
        // Минимальная версия Android 5.0
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        // Включаем поддержку multidex для больших проектов
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Используем debug-ключ для тестов, чтобы сборка не требовала паролей
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.multidex:multidex:2.0.1'
}
