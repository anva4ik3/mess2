plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.messenger"
    [span_1](start_span)compileSdk 34 // Фиксируем версию[span_1](end_span)

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.example.messenger"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        [span_2](start_span)multiDexEnabled true[span_2](end_span)
    }

    buildTypes {
        release {
            [span_3](start_span)signingConfig signingConfigs.debug // Пока используем debug-ключ[span_3](end_span)
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.multidex:multidex:2.0.1'
}
